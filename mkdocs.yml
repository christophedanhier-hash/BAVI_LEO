site_name: BAVI LEO — Bureaux Agentiques Virtuels
site_description: Portail des bureaux IA — PRO (Solidaris), OCA (T600), Voyages, Général
site_author: Christophe (Tofdan) & LEO
repo_url: https://github.com/christophedanhier-hash/BAVI_LEO
edit_uri: edit/main/docs/
copyright: "&copy; 2026 Christophe Danhier — Propulsé par Hermes Agent"

theme:
  name: material
  language: fr
  palette:
    primary: indigo
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christophedanhier-hash
    - icon: fontawesome/brands/telegram
      link: https://t.me/tofdan

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js

nav:
  - 🌐 Écosystème:
    - 🛡️ Portail LEO: https://christophedanhier-hash.github.io/hermes-wiki/
    - 🏛️ BAVI LEO: https://christophedanhier-hash.github.io/BAVI_LEO/
    - 🔭 Wiki OCA: https://christophedanhier-hash.github.io/wiki-oca/
    - 🧭 Voyages: https://christophedanhier-hash.github.io/voyages-wiki/
    - 🏢 PRO: https://christophedanhier-hash.github.io/pro-wiki/
    - 📚 Général: https://christophedanhier-hash.github.io/general-wiki/
  - Accueil: wiki/index.md
  - 📖 Document Fondateur: wiki/vision.md
  - 🏢 PRO — Solidaris:
    - Robert — Conseil IT: wiki/pro/robert.md
    - Sophie — Finance IT: wiki/pro/sophie.md
    - Assurance Obligatoire: wiki/pro/assurance-obligatoire.md
  - 🔭 OCA (T600):
    - Gérard — Documentation: wiki/oca/gerard.md
  - 🧭 Voyages:
    - Sylvie — Roadbooks: wiki/voyages/sylvie.md
    - Bot Voyages: wiki/voyages/bot-voyages.md
  - 📚 Général:
    - LEO Admin: wiki/general/leo-admin.md
    - Agent Pro: wiki/agent-pro/index.md
    - Agent Pro n8n: wiki/agent-pro/n8n.md
