site_name: BAVI LEO — Bureaux Agentiques Virtuels
site_description: Portail des bureaux IA — PRO (Solidaris), OCA (Astronomie), Voyages, Infra Hermes
site_author: Christophe (Tofdan) & LEO
repo_url: https://github.com/christophedanhier-hash/BAVI_LEO
edit_uri: edit/main/docs/
copyright: "&copy; 2026 Christophe Danhier — Propulsé par Hermes Agent"

theme:
  name: material
  language: fr
  palette:
    primary: indigo
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christophedanhier-hash
    - icon: fontawesome/brands/telegram
      link: https://t.me/tofdan

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/pdf-download.js
  - assets/js/external-links.js


nav:
  - 🌐 Portail LEO:
    - 🤖 Wiki LEO (Hermes): https://christophedanhier-hash.github.io/hermes-wiki/
    - 🔭 Wiki OCA: https://christophedanhier-hash.github.io/wiki-oca/
    - 🧭 Voyages: https://christophedanhier-hash.github.io/voyages-wiki/
    - 📋 Tracker: https://github.com/christophedanhier-hash/leo-tracker/issues
  - 🏠 Accueil:
    - Portail: index.md
    - 📚 Skills: skills.md
    - 📖 Guide: guide-utilisation.md
    - ⏰ Crons: wiki/crons.md
    - 🗺️ Doc-Map: wiki/documentation-map.md
  - 🔧 Michel: wiki/agent-pro/bureau-michel/index.md
  - 🧭 Sylvia: wiki/agent-pro/bureau-sylvia/index.md
  - 🤖 Léo: wiki/agent-pro/bureau-leo/index.md
  - 📝 Gérard: wiki/agent-pro/bureau-gerard/index.md
  - 🩺 Virginie: wiki/agent-pro/bureau-virginie/index.md
  - 🎓 Émile: wiki/agent-pro/bureau-emile/index.md
  - 🏛️ Robert: wiki/agent-pro/bureau-robert/index.md
  - 💰 Sophie: wiki/agent-pro/bureau-sophie/index.md
  - 📚 Connaissance: wiki/agent-pro/bureau-connaissance/index.md
